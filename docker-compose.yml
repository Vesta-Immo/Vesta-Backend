services:
  postgres:
    image: postgres:16-alpine
    container_name: vesta-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vesta_backend}
      POSTGRES_USER: ${POSTGRES_USER:-vesta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vesta}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vesta -d vesta_backend']
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: .
    container_name: vesta-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vesta:vesta@postgres:5432/vesta_backend?schema=public}
      API_KEY: ${API_KEY:-test}
      API_KEY_OPTIONAL: ${API_KEY_OPTIONAL:-true}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: