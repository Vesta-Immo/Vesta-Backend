services:
  postgres:
    image: postgres:16-alpine
    container_name: vesta-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vesta_backend
      POSTGRES_USER: vesta
      POSTGRES_PASSWORD: vesta
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vesta -d vesta_backend']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: